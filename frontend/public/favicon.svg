<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="StudentHub">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#0b1f4a" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)" />

  <!-- Mortarboard (designed to stay readable at small sizes; avoid text glyphs) -->
  <g fill="#ffffff" filter="url(#shadow)">
    <!-- Top -->
    <path d="M32 14 12 24l20 10 20-10-20-10Z" />
    <!-- Cap band -->
    <path d="M18 30v7c0 1.8 6.2 5 14 5s14-3.2 14-5v-7l-14 7-14-7Z" />
    <!-- Tassel -->
    <circle cx="49.5" cy="26.5" r="2.2" />
    <path d="M49.5 28.8c0 8.8-4.3 12.9-9.2 14.8" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" />
  </g>
</svg>
